<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>一会儿吃什么</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D4AA;--bg:#0F0F0F;--bg-elevated:#1A1A1A;--bg-card:#242424;--text:#FFF;--text-secondary:#A0A0A0;--text-tertiary:#666;--border:#333;--warning:#FFB800;--danger:#FF4757}
html,body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.app{min-height:100vh;display:flex;flex-direction:column;padding:16px;max-width:480px;margin:0 auto}
.main-card{background:var(--bg-card);border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.4);flex:1}
.header{text-align:center;padding-bottom:20px;border-bottom:1px solid var(--border)}
.header-icon{font-size:40px;margin-bottom:8px}
.header h1{font-size:22px;margin-bottom:4px}
.header p{font-size:13px;color:var(--text-secondary)}
.settings-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-elevated);border-radius:10px;cursor:pointer;margin-bottom:12px}
.toggle-text{flex:1;font-size:14px}
.toggle-arrow{font-size:10px;color:var(--text-tertiary);transition:transform .3s}
.settings-toggle.active .toggle-arrow{transform:rotate(180deg)}
.settings{background:var(--bg-elevated);border-radius:10px;padding:14px;margin-bottom:16px;display:none}
.settings.show{display:block}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:13px;color:var(--text-secondary)}
.location-text{font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis}
.btn-text{background:none;border:none;color:var(--primary);font-size:12px;cursor:pointer}
.location-input{padding:10px;background:var(--bg-card);border-radius:8px;margin-top:10px}
.location-input input{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:8px}
.location-input input:focus{border-color:var(--primary)}
.input-actions{display:flex;gap:8px}
.btn-primary{flex:1;padding:8px;background:var(--primary);border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer}
.btn-ghost{padding:8px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-secondary);cursor:pointer}
.select-styled{padding:6px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px}
.slot-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 0}
.slot-machine{width:100%;background:linear-gradient(135deg,var(--bg-elevated),var(--bg-card));border-radius:16px;padding:40px 20px;margin-bottom:20px;text-align:center;border:1px solid var(--border);position:relative}
.slot-machine::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0}
.slot-machine.spinning::before{opacity:1}
.slot-text{font-size:18px;font-weight:600}
.slot-machine.spinning .slot-text{animation:textPulse .15s infinite}
@keyframes textPulse{0%,100%{opacity:1}50%{opacity:.7}}
.action-btn{padding:14px 40px;font-size:16px;font-weight:600;border:none;border-radius:50px;background:linear-gradient(135deg,var(--primary),#FF8C5A);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,.4)}
.action-btn:hover{transform:translateY(-2px)}
.action-btn.spinning{background:linear-gradient(135deg,var(--danger),#FF6B6B);animation:btnPulse .8s infinite}
@keyframes btnPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.status-bar{margin-top:12px;font-size:12px;color:var(--text-tertiary);text-align:center}
.result-section{margin-top:16px}
.result-card{background:var(--bg-elevated);border-radius:16px;padding:16px;border:1px solid var(--border);animation:slideUp .3s}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.result-name{font-size:18px;flex:1;margin-right:10px}
.result-badge{display:flex;align-items:center;gap:4px;background:var(--bg-card);padding:4px 10px;border-radius:16px}
.badge-stars{color:var(--warning);font-size:11px}
.badge-score{color:var(--warning);font-weight:600;font-size:13px}
.result-meta{display:flex;gap:12px;margin-bottom:10px;font-size:12px;color:var(--text-secondary)}
.result-address{font-size:12px;color:var(--text-tertiary);padding-bottom:12px;border-bottom:1px solid var(--border)}
.result-recommend{background:rgba(0,212,170,.1);border-left:3px solid var(--secondary);padding:12px;border-radius:0 8px 8px 0;margin-bottom:12px}
.recommend-title{font-size:12px;font-weight:600;color:var(--secondary);margin-bottom:6px}
.recommend-text{font-size:13px;line-height:1.6;white-space:pre-line}
.result-actions{display:flex;gap:10px}
.btn-exclude{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:13px;cursor:pointer}
.btn-exclude:hover{border-color:var(--danger);color:var(--danger)}
.btn-nav{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:10px;background:var(--secondary);border-radius:8px;color:var(--bg);font-size:13px;text-decoration:none}
.exclude-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg-elevated);border-radius:10px;margin-top:12px}
.exclude-label{font-size:12px;color:var(--text-secondary)}
.exclude-label strong{color:var(--primary)}
.btn-manage{background:none;border:none;color:var(--text-tertiary);font-size:12px;cursor:pointer}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--text-tertiary)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal.hidden{display:none}
.modal-content{background:var(--bg-card);border-radius:16px;width:100%;max-width:340px;max-height:70vh}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:15px}
.modal-close{background:none;border:none;color:var(--text-tertiary);font-size:22px;cursor:pointer}
.modal-body{padding:14px;overflow-y:auto}
.modal-footer{padding:14px;border-top:1px solid var(--border)}
.exclude-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-elevated);border-radius:6px;margin-bottom:6px;font-size:13px}
.exclude-item .remove-btn{color:var(--danger);font-size:11px;cursor:pointer}
.btn-danger{width:100%;padding:10px;background:transparent;border:1px solid var(--danger);border-radius:8px;color:var(--danger);font-size:13px;cursor:pointer}
.empty-state{text-align:center;padding:24px;color:var(--text-tertiary)}
.hidden{display:none!important}
@media(max-width:380px){.app{padding:10px}.main-card{padding:14px}.header-icon{font-size:32px}.slot-machine{padding:30px 14px}.slot-text{font-size:16px}.action-btn{padding:12px 32px}}
    </style>
</head>
<body>
<div class="app">
<main class="main-card">
<header class="header"><div class="header-icon">🍽️</div><h1>一会儿吃什么</h1><p>打工人吃饭选择困难症终结者</p></header>
<div class="settings-toggle" id="settingsToggle"><span>⚙️</span><span class="toggle-text">设置</span><span class="toggle-arrow">▼</span></div>
<section class="settings" id="settingsPanel">
<div class="setting-row"><span class="setting-label">📍 位置</span><div class="setting-content"><span id="locationText" class="location-text">定位中...</span><button id="editLocationBtn" class="btn-text">修改</button></div></div>
<div id="locationInputBox" class="location-input hidden"><input type="text" id="locationInput" placeholder="输入详细地址，如：望京SOHO"><div class="input-actions"><button id="confirmLocationBtn" class="btn-primary">确定</button><button id="cancelLocationBtn" class="btn-ghost">取消</button></div></div>
<div class="setting-row"><span class="setting-label">📏 范围</span><select id="radiusSelect" class="select-styled"><option value="500">500米</option><option value="1000">1公里</option><option value="2000" selected>2公里</option><option value="3000">3公里</option></select></div>
<div class="setting-row"><span class="setting-label">🏷️ 类型</span><select id="typeSelect" class="select-styled"><option value="">全部</option><option value="050100">中餐厅</option><option value="050200">外国餐厅</option><option value="050300">快餐厅</option><option value="050400">咖啡厅</option><option value="050800">甜品店</option></select></div>
</section>
<section class="slot-section"><div class="slot-machine" id="slotMachine"><div class="slot-text" id="slotDisplay">准备好了吗？</div></div><button id="actionBtn" class="action-btn">开始决定</button><div class="status-bar" id="statusText"></div></section>
<section class="result-section hidden" id="resultSection"><div class="result-card"><div class="result-top"><h2 class="result-name" id="resultName">--</h2><div class="result-badge"><span class="badge-stars" id="resultStars"></span><span class="badge-score" id="resultScore">--</span></div></div><div class="result-meta"><span>📍 <span id="resultDistance">--</span></span><span>💰 <span id="resultPrice">--</span></span><span>🏷️ <span id="resultType">--</span></span></div><div class="result-address" id="resultAddress">--</div><div class="result-recommend"><div class="recommend-title">✨ 推荐理由</div><p class="recommend-text" id="resultComment">--</p></div><div class="result-actions"><button id="excludeBtn" class="btn-exclude">🚫 不想吃</button><a id="mapLink" href="#" target="_blank" class="btn-nav">🗺️ 导航</a></div></div></section>
<div class="exclude-bar"><span class="exclude-label">已排除 <strong id="excludeCount">0</strong> 家</span><button id="manageExcludeBtn" class="btn-manage">管理</button></div>
</main>
<footer class="footer">数据来源：高德地图</footer>
</div>
<div id="excludeModal" class="modal hidden"><div class="modal-content"><div class="modal-header"><h3>排除列表</h3><button id="closeModalBtn" class="modal-close">×</button></div><div class="modal-body" id="modalExcludeList"></div><div class="modal-footer"><button id="clearAllExcludeBtn" class="btn-danger">清空全部</button></div></div></div>
<script>
const AMAP_KEY="0577a4434a6a73487d8537e238af75c4";
const state={location:null,isSpinning:false,restaurants:[],current:null,exclude:JSON.parse(localStorage.getItem("exclude")||"[]"),spin:null,req:""};
const $=id=>document.getElementById(id);

const reco={
    dishes:{
        "中餐厅":["红烧肉","糖醋排骨","宫保鸡丁","麻婆豆腐","回锅肉"],
        "川菜":["水煮鱼","麻辣火锅","宫保鸡丁","毛血旺"],
        "湘菜":["剁椒鱼头","小炒肉","口味虾"],
        "粤菜":["白切鸡","烧鹅","煲仔饭"],
        "日料":["寿司","刺身","拉面","天妇罗"],
        "韩餐":["烤肉","石锅拌饭","部队锅"],
        "西餐":["牛排","意面","披萨"],
        "火锅":["肥牛","毛肚","虾滑"],
        "烧烤":["羊肉串","烤翅","烤鱼"],
        "快餐":["套餐饭","盖浇饭"],
        "咖啡":["拿铁","卡布奇诺","蛋糕"],
        "甜品":["班戟","蛋糕","冰淇淋"],
        "小吃":["肉夹馍","凉皮","麻辣烫"],
        "清真":["手抓羊肉","泡馍","牛肉面"]
    },
    get(name,type){
        let n=name.toLowerCase();
        if(n.includes("火锅"))return["精品肥牛","鲜毛肚","虾滑"];
        if(n.includes("烧烤")||n.includes("烤肉"))return["烤五花肉","羊肉串","烤翅"];
        if(n.includes("日")||n.includes("寿司"))return["寿司拼盘","刺身","拉面"];
        if(n.includes("韩"))return["韩式烤肉","石锅拌饭","部队锅"];
        if(n.includes("面"))return["招牌面条","牛肉面","拌面"];
        if(n.includes("鸡"))return["招牌鸡肉","炸鸡套餐","鸡翅"];
        if(n.includes("牛肉"))return["牛肉面","牛排","红烧牛肉"];
        if(n.includes("羊肉"))return["手抓羊肉","羊肉串"];
        for(let[k,v]of Object.entries(this.dishes))if(type&&type.includes(k))return v;
        return["招牌菜","特色套餐","人气美食"];
    },
    gen(r){
        let name=r.name||"这家店",type=r.type||"",d=r.distance||0,s=r.biz_ext?.rating,p=r.biz_ext?.cost;
        let dishes=this.get(name,type).sort(()=>Math.random()-.5).slice(0,3);
        let c=name+"，离你约"+(d<1000?Math.round(d)+"米":(d/1000).toFixed(1)+"公里")+"。";
        if(s){let x=parseFloat(s);c+=x>=4.5?"评分"+s+"，口碑很好！":x>=4?"评分"+s+"，评价不错。":"评分"+s+"，可以试试。"}
        c+="\n\n推荐菜品："+dishes.join("、");
        if(p){let y=parseInt(p);c+=y<=30?"\n\n人均约"+p+"元，很实惠。":y<=60?"\n\n人均约"+p+"元，价格适中。":"\n\n人均约"+p+"元。"}
        if(d<500)c+="\n\n就在附近，很方便！";
        return c;
    }
};

const reqF={
    parse(t){
        if(!t)return null;
        let r={maxD:null,maxP:null,ex:[]};
        if(/不远|近|懒得走/.test(t))r.maxD=500;
        if(/便宜|实惠/.test(t))r.maxP=50;
        if(/不吃辣/.test(t))r.ex=["川菜","湘菜","火锅","辣"];
        if(/不吃海鲜/.test(t))r.ex.push("海鲜");
        return r;
    },
    filter(list,req){
        if(!req)return list;
        return list.filter(r=>{
            if(req.maxD&&r.distance>req.maxD)return false;
            if(req.maxP&&parseInt(r.biz_ext?.cost||999)>req.maxP)return false;
            if(req.ex.length){let t=(r.type||"").toLowerCase(),n=(r.name||"").toLowerCase();for(let e of req.ex)if(t.includes(e.toLowerCase())||n.includes(e.toLowerCase()))return false}
            return true;
        });
    }
};

function fmtD(m){return m<1000?Math.round(m)+"米":(m/1000).toFixed(1)+"公里"}
function stars(s){if(!s)return"--";let f=Math.floor(s),h=s-f>=0.5;return"★".repeat(f)+(h?"☆":"")+"☆".repeat(5-f-h)}

async function getLoc(){
    $("locationText").textContent="定位中...";
    return new Promise((res,rej)=>{
        if(!navigator.geolocation){rej(Error("不支持定位"));return}
        navigator.geolocation.getCurrentPosition(async p=>{
            let{lng,lat}=p.coords;
            try{
                let resp=await fetch(`https://restapi.amap.com/v3/geocode/regeo?key=${AMAP_KEY}&location=${lng},${lat}`);
                let d=await resp.json();
                let a=d.regeocode?.formatted_address||"";
                state.location={lng,lat,address:a};
                $("locationText").textContent=a.split("市")[1]?.substring(0,16)||a.substring(0,16);
            }catch(e){
                state.location={lng,lat,address:lng.toFixed(4)+","+lat.toFixed(4)};
                $("locationText").textContent=state.location.address;
            }
            res();
        },e=>{
            let m="定位失败";
            if(e.code===e.PERMISSION_DENIED)m="请授权定位";
            $("locationText").textContent=m;
            rej(Error(m));
        },{timeout:8000});
    });
}

async function geocode(addr){
    // 添加城市限制，提高地址解析精度
    let city="";
    // 如果地址中没有城市名，默认添加北京市
    if(!/北京|上海|广州|深圳|杭州|南京|成都|武汉|西安|重庆|天津|苏州|郑州|长沙|济南|青岛|大连|宁波|厦门|无锡|哈尔滨/.test(addr)){
        city="北京市";
    }
    let resp=await fetch(`https://restapi.amap.com/v3/geocode/geo?key=${AMAP_KEY}&address=${encodeURIComponent(city+addr)}&city=${encodeURIComponent(city||"")}`);
    let d=await resp.json();
    if(d.status==="1"&&d.geocodes?.[0]){
        let[lng,lat]=d.geocodes[0].location.split(",");
        let resultAddr=d.geocodes[0].formatted_address;
        // 验证返回的地址是否包含用户输入的关键词
        let province=d.geocodes[0].province||"";
        return{lng:parseFloat(lng),lat:parseFloat(lat),address:resultAddr,province:province};
    }
    throw Error("地址解析失败，请输入更详细的地址");
}

async function search(){
    if(!state.location)throw Error("请先设置位置");
    let{lng,lat}=state.location,r=$("radiusSelect").value,t=$("typeSelect").value;
    let url=`https://restapi.amap.com/v3/place/around?key=${AMAP_KEY}&location=${lng},${lat}&radius=${r}&keywords=餐厅|美食|饭店&offset=50&extensions=all`;
    if(t)url+="&types="+t;
    $("statusText").textContent="搜索中...";
    let resp=await fetch(url),d=await resp.json();
    if(d.status==="1"&&d.pois?.length){
        let list=d.pois.filter(p=>!state.exclude.some(e=>e.id===p.id));
        if(state.req)list=reqF.filter(list,reqF.parse(state.req));
        return list;
    }
    return[];
}

async function start(){
    try{
        state.restaurants=await search();
        if(!state.restaurants.length){$("statusText").textContent="没找到合适的餐厅";$("slotDisplay").textContent="换个试试？";return}
        state.isSpinning=true;
        $("slotMachine").classList.add("spinning");
        $("actionBtn").classList.add("spinning");
        $("actionBtn").textContent="停！";
        $("statusText").textContent="找到 "+state.restaurants.length+" 家";
        $("resultSection").classList.add("hidden");
        let i=0;
        state.spin=setInterval(()=>$("slotDisplay").textContent=state.restaurants[i++%state.restaurants.length].name,80);
    }catch(e){$("statusText").textContent=e.message}
}

function stop(){
    if(!state.isSpinning)return;
    clearInterval(state.spin);
    state.isSpinning=false;
    $("slotMachine").classList.remove("spinning");
    $("actionBtn").classList.remove("spinning");
    $("actionBtn").textContent="再来一次";
    let r=state.restaurants[Math.floor(Math.random()*state.restaurants.length)];
    state.current=r;
    $("resultSection").classList.remove("hidden");
    $("resultName").textContent=r.name;
    $("resultStars").textContent=stars(r.biz_ext?.rating);
    $("resultScore").textContent=r.biz_ext?.rating||"--";
    $("resultDistance").textContent=fmtD(r.distance);
    $("resultPrice").textContent=r.biz_ext?.cost?"¥"+r.biz_ext.cost:"--";
    $("resultType").textContent=r.type?.split(";")[0]||"--";
    $("resultAddress").textContent=r.address||"--";
    $("resultComment").textContent=reco.gen(r);
    if(state.location){let{lng,lat}=state.location,[dl,da]=r.location.split(",");$("mapLink").href=`https://uri.amap.com/navigation?from=${lng},${lat}&to=${dl},${da}&mode=walk&coordinate=gaode&callnative=1`}
    $("statusText").textContent="今天就吃它！";
}

function bind(){
    $("settingsToggle").onclick=()=>{document.querySelector(".toggle-arrow").style.transform=document.querySelector(".settings-toggle").classList.toggle("active")?"rotate(180deg)":"";$("settingsPanel").classList.toggle("show")};
    $("actionBtn").onclick=()=>state.isSpinning?stop():start();
    $("editLocationBtn").onclick=()=>{$("locationInputBox").classList.remove("hidden");$("locationInput").value=state.location?.address||"";$("locationInput").focus()};
    $("confirmLocationBtn").onclick=async()=>{
        let a=$("locationInput").value.trim();
        if(!a){alert("请输入地址");return}
        try{
            $("locationText").textContent="解析中...";
            let loc=await geocode(a);
            state.location=loc;
            $("locationText").textContent=loc.address.split("市")[1]?.substring(0,14)||loc.address.substring(0,14);
            $("locationInputBox").classList.add("hidden");
        }catch(e){alert("地址解析失败\n请输入更详细的地址，如：\n望京SOHO、中关村创业大街");$("locationText").textContent=state.location?.address||"定位失败"}
    };
    $("cancelLocationBtn").onclick=()=>$("locationInputBox").classList.add("hidden");
    $("excludeBtn").onclick=()=>{if(!state.current)return;if(!state.exclude.some(e=>e.id===state.current.id)){state.exclude.push({id:state.current.id,name:state.current.name});localStorage.setItem("exclude",JSON.stringify(state.exclude));$("excludeCount").textContent=state.exclude.length;$("statusText").textContent="已排除 "+state.current.name;state.restaurants=state.restaurants.filter(x=>x.id!==state.current.id)}};
    $("manageExcludeBtn").onclick=()=>{renderEx();$("excludeModal").classList.remove("hidden")};
    $("closeModalBtn").onclick=()=>$("excludeModal").classList.add("hidden");
    $("excludeModal").onclick=e=>{if(e.target===$("excludeModal"))$("excludeModal").classList.add("hidden")};
    $("clearAllExcludeBtn").onclick=()=>{if(confirm("确定清空？")){state.exclude=[];localStorage.setItem("exclude","[]");$("excludeCount").textContent=0;renderEx()}};
    let timer;
    $("actionBtn").addEventListener("touchstart",()=>{timer=setTimeout(()=>{let r=prompt("说说你的需求：\n如：不想走远、不想吃辣",state.req);if(r!=null)state.req=r.trim()},500)});
    $("actionBtn").addEventListener("touchend",()=>clearTimeout(timer));
    $("actionBtn").addEventListener("touchmove",()=>clearTimeout(timer));
    $("actionBtn").oncontextmenu=e=>{e.preventDefault();let r=prompt("说说你的需求：\n如：不想走远、不想吃辣",state.req);if(r!=null)state.req=r.trim()};
}

function renderEx(){
    if(!state.exclude.length){$("modalExcludeList").innerHTML="<div class='empty-state'>暂无排除项</div>";return}
    $("modalExcludeList").innerHTML=state.exclude.map(i=>`<div class='exclude-item'><span>${i.name}</span><span class='remove-btn' data-id='${i.id}'>移除</span></div>`).join("");
    $("modalExcludeList").querySelectorAll(".remove-btn").forEach(b=>b.onclick=()=>{state.exclude=state.exclude.filter(x=>x.id!==b.dataset.id);localStorage.setItem("exclude",JSON.stringify(state.exclude));$("excludeCount").textContent=state.exclude.length;renderEx()});
}

$("excludeCount").textContent=state.exclude.length;
bind();
getLoc().catch(()=>$("statusText").textContent="请手动输入地址");
</script>
</body>
</html>
